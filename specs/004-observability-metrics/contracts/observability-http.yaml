openapi: 3.1.0
info:
  title: Observability HTTP Contract
  version: "1.0.0"
paths:
  /api/v1/to-do-items:
    get:
      summary: List to-do items with request correlation
      description: >
        Existing business endpoint behavior is preserved, with the addition that
        every response includes an effective request correlation identifier.
      parameters:
        - in: header
          name: X-Request-Id
          required: false
          schema:
            type: string
          description: Optional client-supplied request correlation identifier. When present, the service preserves it.
      responses:
        "200":
          description: Successful list response with request correlation header.
          headers:
            X-Request-Id:
              description: Effective request correlation identifier used in operational records and the HTTP response.
              schema:
                type: string
        "400":
          description: Validation failure with request correlation header when a response is produced.
          headers:
            X-Request-Id:
              description: Effective request correlation identifier used for troubleshooting the failed request.
              schema:
                type: string
  /metrics:
    get:
      summary: Retrieve Prometheus application metrics
      description: >
        Returns the current Prometheus-formatted metrics for the service.
        Access follows the same security posture as the normal API surface.
      responses:
        "200":
          description: Prometheus text exposition of request traffic, latency, and error metrics.
          content:
            text/plain:
              schema:
                type: string
