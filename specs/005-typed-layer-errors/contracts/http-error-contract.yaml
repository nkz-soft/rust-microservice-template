openapi: 3.1.0
info:
  title: Typed Layer Error HTTP Contract
  version: "1.0.0"
paths:
  /api/v1/to-do-items/{id}:
    get:
      summary: Retrieve a to-do item with stable typed-error mapping
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful to-do item response.
        "404":
          description: The requested to-do item does not exist.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: An unexpected internal failure occurred and was sanitized for the client.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      summary: Update a to-do item with stable typed-error mapping
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: If-Match
          required: true
          schema:
            type: string
          description: Required optimistic concurrency token.
      responses:
        "200":
          description: The to-do item was updated successfully.
        "400":
          description: The request body or optimistic-locking input was invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "412":
          description: The optimistic concurrency token is stale for the current item version.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "428":
          description: The required `If-Match` header is missing.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: An unexpected internal failure occurred and was sanitized for the client.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  schemas:
    ProblemDetails:
      type: object
      description: RFC 9457-style problem-details response with stable client-visible fields.
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
      required:
        - title
        - status
        - detail
