name: coverage

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --all-features --cobertura --output-path coverage/coverage.cobertura.xml --fail-under-lines 90

      - name: Build coverage summary
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.4
        with:
          reports: 'coverage/*.cobertura.xml'
          targetdir: 'coverage/result'
          reporttypes: 'Cobertura;MarkdownSummaryGithub'

      - name: Publish coverage summary
        run: |
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          cat coverage/result/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: coverage/result/SummaryGithub.md

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/*.cobertura.xml
            coverage/result
