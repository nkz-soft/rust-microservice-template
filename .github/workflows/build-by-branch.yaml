name: build-by-branch

on:
  push:
    branches:
    - main
    - feature/*
    - fix/*
    paths-ignore:
    - "**.md"
  pull_request:
   branches:
   - main
   paths-ignore:
   - "**.md"
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy, llvm-tools-preview
    - name: Install cargo-llvm-cov
      if: github.event_name == 'pull_request'
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Check code style
      run: cargo fmt -- --check
    - name: Build
      run: cargo build --release --all-features
    - name: Check code
      run: cargo clippy
    - name: Tests
      if: github.event_name != 'pull_request'
      run: cargo test
    - name: Generate coverage report
      if: github.event_name == 'pull_request'
      run: |
        mkdir -p coverage
        cargo llvm-cov --workspace --all-features --cobertura --output-path coverage/coverage.cobertura.xml --fail-under-lines 90
    - name: Build coverage summary
      if: github.event_name == 'pull_request'
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.5
      with:
        reports: 'coverage/*.cobertura.xml'
        targetdir: 'coverage/result'
        reporttypes: 'Cobertura;MarkdownSummaryGithub'
    - name: Publish coverage summary
      if: github.event_name == 'pull_request'
      run: |
        echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
        cat coverage/result/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v3
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: coverage/result/SummaryGithub.md
    - name: Upload coverage artifacts
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: |
          coverage/*.cobertura.xml
          coverage/result
