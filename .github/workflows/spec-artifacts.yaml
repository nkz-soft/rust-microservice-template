name: spec-artifacts

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

jobs:
  verify-spec-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify specs artifacts for implementation changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if echo ",$PR_LABELS," | grep -q ",specs-exempt,"; then
            echo "Skipping spec artifact enforcement because specs-exempt label is present."
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No changed files detected."
            exit 0
          fi

          requires_specs=0
          has_specs=0

          for file in "${changed_files[@]}"; do
            case "$file" in
              specs/*)
                has_specs=1
                ;;
              src/*|tests/*|deployment/*|Cargo.toml|Cargo.lock|config.app.toml|diesel.toml|Dockerfile)
                requires_specs=1
                ;;
            esac
          done

          if [ "$requires_specs" -eq 1 ] && [ "$has_specs" -ne 1 ]; then
            echo "::error title=Missing spec artifacts::Implementation changes require matching updates under specs/. Add feature artifacts or apply the specs-exempt label."
            exit 1
          fi

          echo "Spec artifact check passed."
